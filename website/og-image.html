<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 1200px; height: 630px; overflow: hidden;
  background: #09090f;
  font-family: 'Inter', system-ui, sans-serif;
  display: flex;
}
.left { flex: 1; padding: 60px; display: flex; flex-direction: column; justify-content: center; }
.right {
  width: 380px; background: #111118; border-left: 1px solid #1e1e2a;
  display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px;
}
.badge {
  display: inline-block; background: #7c3aed; color: #fff;
  font-size: 12px; font-weight: 700; padding: 4px 12px;
  border-radius: 4px; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 20px;
}
h1 { font-size: 52px; font-weight: 800; color: #e8e8f0; line-height: 1.1; margin-bottom: 20px; }
h1 span { color: #7c3aed; }
p { font-size: 18px; color: #888899; line-height: 1.5; max-width: 460px; margin-bottom: 30px; }
.chip {
  display: inline-block; background: #1e1e2a; color: #e8e8f0;
  font-size: 13px; padding: 6px 14px; border-radius: 20px; margin: 4px; border: 1px solid #2a2a3a;
}
.candidate {
  background: #1e1e2a; border: 1px solid #2a2a3a; border-radius: 8px;
  padding: 12px 16px; margin: 6px 0; width: 100%; display: flex; align-items: center; gap: 10px;
}
.avatar {
  width: 32px; height: 32px; border-radius: 50%; background: #7c3aed;
  display: flex; align-items: center; justify-content: center; font-size: 13px; color: #fff; font-weight: 700;
}
.name { font-size: 14px; color: #e8e8f0; font-weight: 600; }
.role { font-size: 11px; color: #888899; }
.status { margin-left: auto; background: #7c3aed22; color: #a78bfa; font-size: 10px; padding: 2px 8px; border-radius: 10px; }
.bottom-bar { position: absolute; bottom: 0; left: 0; right: 0; height: 4px; background: linear-gradient(90deg, #7c3aed, #f59e0b); }
.footer-credit { position: absolute; bottom: 20px; left: 60px; font-size: 13px; color: #555; }
</style>
</head>
<body>
<div class="left">
  <div class="badge">Demo</div>
  <h1>Aura <span>Recruit</span></h1>
  <p>Modern recruitment platform with Vue 3</p>
  <div>
    <span class="chip">Vue 3</span>
    <span class="chip">TypeScript</span>
    <span class="chip">Vite</span>
    <span class="chip">Vitest</span>
  </div>
</div>
<div class="right">
  <div class="candidate"><div class="avatar">AB</div><div><div class="name">Anna Berg</div><div class="role">Frontend Dev</div></div><div class="status">Review</div></div>
  <div class="candidate"><div class="avatar">JK</div><div><div class="name">Jan Koch</div><div class="role">Backend Dev</div></div><div class="status">Interview</div></div>
  <div class="candidate"><div class="avatar">SP</div><div><div class="name">Sara Park</div><div class="role">Designer</div></div><div class="status">Offer</div></div>
  <div class="candidate"><div class="avatar">MN</div><div><div class="name">Mike Nord</div><div class="role">DevOps</div></div><div class="status">Hired</div></div>
</div>
<div class="bottom-bar"></div>
<div class="footer-credit">Built by Babak Bandpey · cocode.dk · linkedin.com/in/babakbandpey</div>
</body>
</html>
